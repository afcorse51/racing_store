<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>">
<title>F1 Merch</title>
<script>
const CSV = {
  catalog:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX6uoCwD-7fcpfGgvU_vWKlsmrn7dr0Q21bFohUpOMukETLfHniwLPv3j6b8LIJ2EYJnU5AJWpcnan/pub?gid=0&single=true&output=csv",
  settings: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX6uoCwD-7fcpfGgvU_vWKlsmrn7dr0Q21bFohUpOMukETLfHniwLPv3j6b8LIJ2EYJnU5AJWpcnan/pub?gid=1470648308&single=true&output=csv",
  // Вставь сюда URL из Apps Script после деплоя:
  orders_webhook: "https://script.google.com/macros/s/AKfycbw1C3Xk0sZ7Mr3VIc4pGf0lpYmJx-kTagZ27PFnedRCEegqHEYnFwDu8XT-gFAoBsE/exec",
};
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh}
img{max-width:100%;display:block}
a{text-decoration:none}
button{font-family:inherit;cursor:pointer}
:root{
  --red:#e10600;--red-dark:#b00500;
  --surface:#111;--surface2:#1a1a1a;--surface3:#222;
  --border:#2a2a2a;--text:#f0f0f0;--muted:#888;--dim:#555;
  --radius:10px;--rsm:6px;
}
/* Hero */
.hero{position:relative;padding:2.5rem 1.5rem 2rem;overflow:hidden;text-align:center;background:#0a0a0a}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:repeating-linear-gradient(90deg,#fff 0,#fff 18px,#000 18px,#000 36px)}
.hero-lines{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.hero-lines span{position:absolute;height:1px;background:linear-gradient(90deg,transparent,rgba(225,6,0,.35),transparent);animation:sl 3s linear infinite;opacity:0}
.hero-lines span:nth-child(1){top:28%;width:60%;left:-60%;animation-delay:0s}
.hero-lines span:nth-child(2){top:48%;width:80%;left:-80%;animation-delay:.8s}
.hero-lines span:nth-child(3){top:68%;width:50%;left:-50%;animation-delay:1.6s}
.hero-lines span:nth-child(4){top:38%;width:70%;left:-70%;animation-delay:2.2s}
@keyframes sl{0%{left:-80%;opacity:0}10%{opacity:1}90%{opacity:1}100%{left:110%;opacity:0}}
.hero-inner{position:relative;z-index:1;max-width:640px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:3px;margin-bottom:1.25rem}
.hero-title{font-size:clamp(1.8rem,5vw,3rem);font-weight:800;line-height:1.1;letter-spacing:-.02em;color:#fff;margin-bottom:.75rem}
.hero-subtitle{font-size:clamp(.9rem,2vw,1.05rem);color:var(--muted);line-height:1.6;max-width:480px;margin:0 auto 1.5rem}
.hero-contacts{display:flex;flex-direction:column;align-items:center;gap:8px}
.hero-support-label{font-size:12px;color:var(--muted);letter-spacing:.3px}
.hero-contact-btns{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.hero-link{display:flex;align-items:center;gap:8px;padding:10px 22px;border-radius:var(--rsm);font-size:13px;font-weight:700;border:none;color:#fff;transition:transform .15s,opacity .15s}
.hero-link:hover{opacity:.88;transform:translateY(-1px)}
.hero-link-wa{background:#25D366}
.hero-link-ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.hero-link svg{width:17px;height:17px;flex-shrink:0}
/* Layout */
.container{max-width:1000px;margin:0 auto;padding:0 1rem}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 1rem;gap:10px;flex-wrap:wrap}
.filters{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.fbtn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;background:transparent;color:var(--muted);transition:all .15s}
.fbtn:hover{border-color:#444;color:var(--text)}
.fbtn.active{background:var(--red);color:#fff;border-color:var(--red)}
.toolbar-right{display:flex;align-items:center;gap:8px}
.cur-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:700;transition:border-color .15s;white-space:nowrap}
.cur-btn:hover{border-color:#444}
.cart-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:600;transition:border-color .15s;white-space:nowrap}
.cart-btn:hover{border-color:#444}
.cart-badge{background:var(--red);color:#fff;border-radius:10px;font-size:11px;padding:1px 7px;min-width:20px;text-align:center}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;padding-bottom:2rem}
/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s}
.card:hover{border-color:#333;transform:translateY(-2px)}
.card-img{width:100%;padding-top:100%;background:var(--surface2);position:relative;overflow:hidden;font-size:0}
.card-img-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:42px}
.card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.avail-pill{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;z-index:2}
.card-body{padding:10px 12px}
.card-team{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px}
.card-meta{font-size:11px;color:var(--muted);margin-bottom:4px;display:flex;flex-wrap:wrap;gap:4px}
.card-meta span{background:var(--surface3);border-radius:3px;padding:1px 5px}
.card-sizes{font-size:11px;color:var(--muted);margin-bottom:8px}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.price{font-size:14px;font-weight:700;color:#fff}
.add-btn{display:flex;align-items:center;gap:4px;background:var(--red);color:#fff;border:none;border-radius:var(--rsm);padding:5px 10px;font-size:11px;font-weight:600;transition:background .15s}
.add-btn:hover{background:var(--red-dark)}
.add-btn:disabled{background:var(--surface3);color:var(--dim);cursor:default}
/* Overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center;padding:0}
.overlay.open{display:flex}
@media(min-width:560px){.overlay{align-items:center;padding:1rem}}
.panel{background:var(--surface);border:1px solid var(--border);width:100%;max-width:440px;border-radius:var(--radius) var(--radius) 0 0;max-height:92vh;overflow-y:auto;position:relative;scrollbar-width:thin;scrollbar-color:#333 transparent}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
@media(min-width:560px){.panel{border-radius:var(--radius)}}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.panel-title{font-size:14px;font-weight:700;color:var(--text)}
.close-btn{background:none;border:none;color:var(--muted);font-size:20px;display:flex;align-items:center;padding:2px;transition:color .15s}
.close-btn:hover{color:#fff}
.panel-body{padding:1.25rem}
/* Carousel */
.pm-carousel{position:relative;width:100%;padding-top:100%;background:var(--surface2);border-radius:var(--rsm);margin-bottom:1rem;overflow:hidden;user-select:none;font-size:0;cursor:zoom-in}
.pm-carousel-track{position:absolute;inset:0;display:flex;width:100%;height:100%;transition:transform .3s ease}
.pm-carousel-slide{flex:0 0 100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:60px}
.pm-carousel-slide img{width:100%;height:100%;object-fit:cover;object-position:center top}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;background:rgba(0,0,0,.55);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.carousel-arrow:hover{background:rgba(0,0,0,.85)}
.carousel-arrow.prev{left:8px}.carousel-arrow.next{right:8px}
.carousel-dots{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:5}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:background .15s}
.carousel-dot.active{background:#fff}
.pm-team{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.pm-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3}
.pm-attrs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.pm-attr{font-size:11px;background:var(--surface3);border-radius:3px;padding:3px 7px;color:var(--muted)}
.pm-attr b{color:var(--text);font-weight:600}
.pm-price{font-size:22px;font-weight:800;color:var(--red);margin-bottom:1.25rem}
.field-label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.size-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.25rem}
.size-btn{padding:6px 14px;border-radius:var(--rsm);border:1px solid var(--border);font-size:13px;font-weight:600;background:transparent;color:var(--muted);transition:all .15s}
.size-btn:hover:not(:disabled){border-color:#444;color:#fff}
.size-btn.sel{background:var(--red);color:#fff;border-color:var(--red)}
.size-btn:disabled{opacity:.28;cursor:default;text-decoration:line-through}
.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.qty-btn{width:34px;height:34px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface2);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.qty-btn:hover{border-color:#444}
.qty-val{font-size:16px;font-weight:700;color:#fff;min-width:28px;text-align:center}
.pm-add{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:var(--rsm);font-size:14px;font-weight:700;transition:background .15s}
.pm-add:hover{background:var(--red-dark)}
.pm-add:disabled{background:var(--surface3);color:var(--dim);cursor:default}
/* Lightbox */
.lb{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.95);flex-direction:column;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-img-wrap{position:relative;max-width:90vw;max-height:82vh;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:zoom-in}
.lb-img-wrap.zoomed{cursor:zoom-out;overflow:visible}
.lb img{max-width:90vw;max-height:82vh;object-fit:contain;border-radius:4px;transition:transform .25s ease;user-select:none;pointer-events:none;display:block}
.lb-img-wrap.zoomed img{transform:scale(2.2)}
.lb-close{position:fixed;top:16px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10}
.lb-arrow:hover{background:rgba(255,255,255,.2)}
.lb-arrow.prev{left:16px}.lb-arrow.next{right:16px}
.lb-counter{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px;font-weight:600;letter-spacing:1px}
/* Cart */
.cart-empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:14px}
.cart-empty svg{width:36px;height:36px;margin:0 auto 10px;opacity:.3}
.ci{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.ci-emoji{font-size:28px;flex-shrink:0;line-height:1.1;width:36px;text-align:center}
.ci-img{width:40px;height:40px;border-radius:5px;object-fit:cover;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-preorder{display:inline-block;margin-left:6px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);background:var(--surface3);border-radius:3px;padding:1px 5px;vertical-align:middle}
.ci-sub{font-size:12px;color:var(--muted);margin-top:2px}
.ci-qrow{display:flex;align-items:center;gap:7px;margin-top:6px}
.ci-qbtn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center}
.ci-qbtn:hover{border-color:#444}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.ci-price{font-size:13px;font-weight:700;color:#fff}
.ci-del{background:none;border:none;color:var(--dim);font-size:16px;padding:2px}
.ci-del:hover{color:#e10600}
.cart-total{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:14px;font-weight:700;color:#fff}

/* ── Delivery section in cart ── */
.delivery-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:14px;margin:10px 0 4px}
.delivery-section-title{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.delivery-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--rsm);overflow:hidden;margin-bottom:12px}
.dtab{flex:1;padding:8px 10px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.dtab.active{background:var(--red);color:#fff}
.dtab-pane{display:none}
.dtab-pane.active{display:block}
.d-field{margin-bottom:10px}
.d-label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block}
.d-input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:13px;padding:8px 10px;outline:none;transition:border-color .15s;font-family:inherit}
.d-input:focus{border-color:#555}
.d-input::placeholder{color:var(--dim)}
.d-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.delivery-filled-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#4caf50;font-weight:600;margin-bottom:10px}
.delivery-filled-badge::before{content:'✓';font-size:13px}
/* Cart actions */
.cart-actions{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.oa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:var(--rsm);font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.oa:not(:disabled):hover{opacity:.88}
.oa-wa{background:#25D366;color:#fff}
.oa-ig{background:#C13584;color:#fff}
.oa:disabled{background:var(--surface3)!important;color:var(--dim)!important;cursor:default;opacity:1}
.oa-place{background:var(--red);color:#fff}
.oa-clear{background:transparent!important;border:1px solid var(--border)!important;color:var(--muted)!important;font-size:13px!important;padding:9px!important}
.oa-clear:not(:disabled):hover{border-color:#444!important;color:#fff!important}
.delivery-required-hint{font-size:11px;color:var(--dim);text-align:center;margin-top:2px}
/* Map */
.map-section{margin-top:10px}
.map-section-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.map-frame{width:100%;height:160px;border-radius:var(--rsm);border:1px solid var(--border);overflow:hidden;background:var(--surface3)}
.map-frame iframe{width:100%;height:100%;border:none}
.pvz-hint{font-size:11px;color:var(--dim);margin-top:5px;line-height:1.5}
.pvz-hint a{color:var(--red)}
/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#fff;color:#111;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* States */
.state-msg{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px;grid-column:1/-1}
.dot{display:inline-block;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
/* Footer */
.footer{border-top:1px solid var(--border);padding:1.5rem 0;text-align:center;color:var(--dim);font-size:12px}
.footer-checker{height:4px;background:repeating-linear-gradient(90deg,#fff 0,#fff 12px,#000 12px,#000 24px);margin-bottom:1rem;opacity:.15}
@media(max-width:400px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}.hero{padding:3rem 1rem 2rem}}
/* Order confirm */
.order-confirm{text-align:center;padding:1.5rem 0}
.order-num{font-size:28px;font-weight:800;color:var(--red);margin-bottom:6px}
.order-sub{font-size:13px;color:var(--muted);line-height:1.6}
.order-wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:16px;padding:13px;background:#25D366;color:#fff;border:none;border-radius:var(--rsm);font-size:14px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-lines"><span></span><span></span><span></span><span></span></div>
  <div class="hero-inner">
    <div class="hero-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
      Formula 1 Merch
    </div>
    <h1 class="hero-title" id="hero-title">Загрузка…</h1>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <div class="hero-contacts">
      <p class="hero-support-label" id="hero-support-label">По всем вопросам пишите нам</p>
      <div class="hero-contact-btns">
      <a class="hero-link hero-link-wa" id="hero-wa" href="#" target="_blank">

        WhatsApp

<script>
/* ════ DEFAULTS ════ */
const DEFAULTS = {
  hero_title:"Официальный F1 мерч",
  hero_subtitle:"Коллекция одежды и аксессуаров команд Формулы 1. Быстрая доставка.",
  site_title:"🏁 F1 Merch",

  whatsapp:"79001234567",
  instagram:"f1merch",
  accent_color:"#e10600",

  btn_order_wa:"Заказать",
  btn_order_ig:"Написать в Instagram",
  btn_add:"В корзину",
  btn_add_size:"Выберите размер",
  btn_clear:"Очистить корзину",
  label_size:"Размер",label_qty:"Количество",label_year:"Год",
  label_color:"Цвет",label_number:"Номер",label_total:"Итого",
  label_pick:"Выбрать параметры",filter_all:"Все",
  msg_empty_cart:"Корзина пуста",msg_added:"Добавлено в корзину ✓",

  support_label:"По всем вопросам пишите нам",
  currency_primary_symbol:"₸",currency_primary_code:"KZT",
  currency_secondary_symbol:"₽",currency_secondary_code:"RUB",
};
const STATUS_COLORS={"в наличии":"var(--red)","на заказ":"#555","нет":"rgba(255,255,255,.08)"};
let S={...DEFAULTS}, products=[], cart=[], activeCat="", currency="primary";
let deliveryData = null; // null = не заполнено
let activeDelivery = "qazpost";

/* ════ CSV ════ */
function normalizeHeader(h){
  return h.replace(/^\uFEFF/,'').replace(/\u00a0/g,' ').toLowerCase().trim()
    .replace(/ё/g,'е').replace(/\s+/g,'_')
    .replace(/₸/g,'_tenge').replace(/₽/g,'_ruble')
    .replace(/тенге/g,'_tenge').replace(/руб(?:лей|ля|ль)?/g,'_ruble')
    .replace(/kzt/g,'_tenge').replace(/rub/g,'_ruble')
    .replace(/[^\u0400-\u04FFa-z0-9_]/g,'');
}
function parseCSV(text){
  text=text.replace(/^\uFEFF/,'');
  const rows=text.trim().split(/\r?\n/).map(row=>{
    const cells=[];let cur="",inQ=false;
    for(let i=0;i<row.length;i++){
      if(row[i]==='"'){inQ=!inQ;}
      else if(row[i]===','&&!inQ){cells.push(cur.trim());cur="";}
      else{cur+=row[i];}
    }
    cells.push(cur.trim());return cells;
  });
  if(rows.length<2)return[];
  const headers=rows[0].map(normalizeHeader);
  return rows.slice(1).filter(r=>r.some(c=>c)).map((r,i)=>{
    const o={_row:i+2};
    headers.forEach((h,j)=>{o[h]=(r[j]||"").trim();});
    return o;
  });
}

/* ════ SETTINGS ════ */
async function loadSettings(){
  if(!CSV.settings)return;
  try{
    const r=await fetch(CSV.settings);
    const rows=parseCSV(await r.text());
    rows.forEach(row=>{
      const nonMeta=Object.keys(row).filter(x=>x!=='_row');
      let k=row['ключ']||row['key']||row[nonMeta[0]]||"";
      let v=row['значение']||row['value']||row[nonMeta[1]]||"";
      k=k.trim();v=v.trim();
      if(k)S[k]=v;
    });
  }catch(e){console.warn("Settings failed",e);}
}

/* ════ CATALOG ════
   Структура таблицы (скрин):
   A=Название B=Команда C=Номер D=Год E=Категория F=Цвет
   G=Размеры H=XS I=S J=M K=L L=XL M=XXL
   N=Цена,₸ O=Цена,₽ P=Наличие Q=Фото
*/
const DEMO=[
  {название:"Лонгслив Ferrari 16",команда:"Ferrari",номер:"16",год:"2026",категория:"Лонгслив",цвет:"красный",размеры:"XS,M,L",xs:"10",s:"",m:"10",l:"10",xl:"",xxl:"","цена_tenge":"16999","цена_ruble":"2502",наличие:"В наличии",фото:""},
  {название:"Комбинезон Red Bull 3",команда:"Red Bull",номер:"3",год:"2026",категория:"Комбинезон",цвет:"синий",размеры:"XS,M,L,XL",xs:"2",s:"",m:"2",l:"2",xl:"2",xxl:"","цена_tenge":"49999","цена_ruble":"7359",наличие:"В наличии",фото:""},
  {название:"Футболка Audi",команда:"Audi",номер:"",год:"2026",категория:"Футболка",цвет:"серая",размеры:"XS,S,M",xs:"1",s:"2",m:"3",l:"",xl:"",xxl:"","цена_tenge":"9999","цена_ruble":"1472",наличие:"В наличии",фото:""},
  {название:"Лонгслив McLaren 81",команда:"McLaren",номер:"81",год:"2026",категория:"Лонгслив",цвет:"Папайя",размеры:"XS,S,M,L",xs:"",s:"",m:"",l:"",xl:"",xxl:"","цена_tenge":"16999","цена_ruble":"2502",наличие:"На заказ",фото:""},
];

async function loadCatalog(){
  if(!CSV.catalog){products=normRows(DEMO);return;}
  try{
    const r=await fetch(CSV.catalog);
    products=normRows(parseCSV(await r.text()));
  }catch(e){console.warn("Catalog failed, using demo",e);products=normRows(DEMO);}
}

function pick(r,...keys){
  for(const k of keys){if(r[k]!==undefined&&r[k]!=="")return r[k];}
  return "";
}
function toNum(v){return parseInt(String(v).replace(/[^\d]/g,""))||0;}

function findPriceCol(r,hint){
  const keys=Object.keys(r);
  const pm=hint==='tenge'?'_tenge':'_ruble';
  const sm=hint==='tenge'?'_ruble':'_tenge';
  for(const k of keys)if((k.includes('цена')||k.includes('price'))&&k.includes(pm)&&r[k]!=="")return r[k];
  for(const k of keys)if((k.includes('цена')||k.includes('price'))&&!k.includes(sm)&&r[k]!=="")return r[k];
  return "";
}

// Маппинг нормализованных заголовков → метки размеров
const SIZE_MAP=[
  ['xs','XS'],['s','S'],['m','M'],['l','L'],['xl','XL'],['xxl','XXL']
];

function normRows(rows){
  return rows.map((r,i)=>{
    const photoRaw=pick(r,'фото','photo','ссылка');
    const photos=photoRaw?photoRaw.split(/[,;\n]+/).map(s=>s.trim()).filter(Boolean):[];

    // Остатки по размерам из колонок XS…XXL
    const sizeStock={};
    SIZE_MAP.forEach(([key,label])=>{
      const val=r[key];
      if(val!==undefined&&val!=="")sizeStock[label]=toNum(val);
    });

    return{
      id:i+1,
      name:pick(r,'название','name'),
      team:pick(r,'команда','team'),
      number:pick(r,'номер','number'),
      year:pick(r,'год','year'),
      cat:pick(r,'категория','cat')||"Прочее",
      color:pick(r,'цвет','color'),
      sizes:pick(r,'размеры','sizes').replace(/\s/g,""),
      sizeStock,
      price_primary:toNum(findPriceCol(r,'tenge')),
      price_secondary:toNum(findPriceCol(r,'ruble')),
      avail:pick(r,'наличие','avail')||"да",
      description:pick(r,'описание','description','desc'),
      photos,
      photo:photos[0]||"",
      emoji:"🏁",
    };
  });
}

/* ════ SETTINGS → DOM ════ */
function applySettings(){
  const ac=S.accent_color||"#e10600";
  document.documentElement.style.setProperty('--red',ac);
  document.documentElement.style.setProperty('--red-dark',shadeHex(ac,-30));
  document.title=S.site_title||"F1 Merch";
  document.getElementById("hero-title").textContent=S.hero_title;
  document.getElementById("hero-subtitle").textContent=S.hero_subtitle;
  document.getElementById("footer-text").textContent=S.footer_text;
  document.getElementById("hero-wa").href="https://wa.me/"+S.whatsapp;
  document.getElementById("hero-ig").href="https://instagram.com/"+S.instagram;
  const sl=document.getElementById("hero-support-label");
  if(sl)sl.textContent=S.support_label||"По всем вопросам пишите нам";
  document.getElementById("lbl-cart").textContent=S.btn_cart;
  document.getElementById("lbl-cart-title").textContent=S.btn_cart;
  document.getElementById("lbl-pick").textContent=S.label_pick;
  document.getElementById("lbl-size-h").textContent=S.label_size;
  document.getElementById("lbl-qty-h").textContent=S.label_qty;
  updateCurBtn();
}
function shadeHex(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.max(0,Math.min(255,(n>>16)+amt));
  const g=Math.max(0,Math.min(255,((n>>8)&0xff)+amt));
  const b=Math.max(0,Math.min(255,(n&0xff)+amt));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ════ CURRENCY ════ */
function curSymbol(){return currency==="primary"?S.currency_primary_symbol:S.currency_secondary_symbol;}
function curCode(){return currency==="primary"?S.currency_primary_code:S.currency_secondary_code;}
function priceOf(p){return currency==="primary"?p.price_primary:p.price_secondary;}
function updateCurBtn(){const b=document.getElementById("cur-toggle");if(b)b.textContent=curSymbol()+" "+curCode();}
function toggleCurrency(){
  currency=currency==="primary"?"secondary":"primary";
  updateCurBtn();renderGrid();
  if(document.getElementById("cart-ov").classList.contains("open"))renderCart();
  if(document.getElementById("pm-ov").classList.contains("open")&&curP)
    document.getElementById("pm-price").textContent=fmt(priceOf(curP));
}
function fmt(n){return Number(n||0).toLocaleString("ru-RU")+" "+curSymbol();}

/* ════ RENDER ════ */
function getCats(){return[S.filter_all||"Все",...new Set(products.map(p=>p.cat))];}
function renderFilters(){
  if(!activeCat)activeCat=S.filter_all||"Все";
  document.getElementById("filters").innerHTML=getCats().map(c=>
    `<button class="fbtn${c===activeCat?" active":""}" onclick="setF('${c.replace(/'/g,"\\'")}')">${c}</button>`
  ).join("");
}
function setF(c){activeCat=c;renderFilters();renderGrid();}

const STATUS_BLOCKED=["нет","нет в наличии","no","0","false","out of stock","недоступно"];
const STATUS_PREORDER=["на заказ","под заказ","preorder","to order"];
function isAvail(p){return!STATUS_BLOCKED.includes((p.avail||"").trim().toLowerCase());}
function isPreorder(p){return STATUS_PREORDER.includes((p.avail||"").trim().toLowerCase());}
function statusColor(s){const n=(s||"").trim().toLowerCase();return S["status_color_"+n.replace(/\s+/g,"_")]||STATUS_COLORS[n]||"rgba(255,255,255,.08)";}
function statusTextColor(s){return S["status_text_color_"+(s||"").trim().toLowerCase().replace(/\s+/g,"_")]||"#fff";}

function driveThumb(url,size){
  if(!url)return"";
  const m=url.match(/\/d\/([^/]+)/);
  if(m)return`https://drive.google.com/thumbnail?id=${m[1]}&sz=w${size}`;
  return url;
}
function cardImgHTML(p){
  if(p.photos&&p.photos.length>0){
    const src=driveThumb(p.photos[0],400);
    return`<img src="${src}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'"><div class="card-img-inner"></div>`;
  }
  return`<div class="card-img-inner">${p.emoji||"🏁"}</div>`;
}

function renderGrid(){
  const all=S.filter_all||"Все";
  const list=activeCat===all?products:products.filter(p=>p.cat===activeCat);
  const grid=document.getElementById("grid");
  if(!list.length){grid.innerHTML=`<div class="state-msg">Нет товаров в этой категории</div>`;return;}
  grid.innerHTML=list.map(p=>{
    const ok=isAvail(p);
    const meta=[
      p.year?`<span>${p.year}</span>`:"",
      p.color?`<span>${p.color}</span>`:"",
      p.number?`<span>#${p.number}</span>`:"",
    ].join("");
    // Показываем только размеры из колонки Размеры, без остатков
    const szLine=p.sizes.split(",").filter(Boolean).join(" · ");
    return`
    <div class="card" onclick="openProduct(${p.id})">
      <div class="card-img">
        ${cardImgHTML(p)}
        <span class="avail-pill" style="background:${statusColor(p.avail)};color:${statusTextColor(p.avail)}">${p.avail}</span>
      </div>
      <div class="card-body">
        <div class="card-team">${p.team}</div>
        <div class="card-name">${p.name}</div>
        ${meta?`<div class="card-meta">${meta}</div>`:""}
        <div class="card-sizes">${szLine}</div>
        <div class="card-foot">
          <div class="price">${fmt(priceOf(p))}</div>
          <button class="add-btn" ${!ok?"disabled":""} onclick="event.stopPropagation();openProduct(${p.id})">
            + ${S.btn_add}
          </button>
        </div>
      </div>
    </div>`;
  }).join("");
}

/* ════ CAROUSEL ════ */
let carouselIndex=0,carouselSlides=[];
function buildCarousel(photos,emoji){
  const track=document.getElementById("pm-carousel-track");
  const prev=document.getElementById("carousel-prev");
  const next=document.getElementById("carousel-next");
  const dots=document.getElementById("carousel-dots");
  carouselIndex=0;
  if(!photos||photos.length===0){
    carouselSlides=[];
    track.innerHTML=`<div class="pm-carousel-slide">${emoji||"🏁"}</div>`;
    prev.style.display="none";next.style.display="none";dots.innerHTML="";return;
  }
  carouselSlides=photos;
  track.innerHTML=photos.map(url=>{
    const src=driveThumb(url,600);
    return`<div class="pm-carousel-slide"><img src="${src}" alt="" onerror="this.parentNode.innerHTML='${emoji||"🏁"}'"></div>`;
  }).join("");
  const show=photos.length>1;
  prev.style.display=show?"flex":"none";next.style.display=show?"flex":"none";
  dots.innerHTML=photos.length>1?photos.map((_,i)=>`<div class="carousel-dot${i===0?' active':''}" onclick="carouselGo(${i})"></div>`).join(""):"";
  carouselSetPos(0,false);
}
function carouselSetPos(idx,animate){
  const track=document.getElementById("pm-carousel-track");
  if(!animate)track.style.transition="none";
  track.style.transform=`translateX(-${idx*100}%)`;
  if(!animate)requestAnimationFrame(()=>{track.style.transition="transform .3s ease";});
  document.querySelectorAll(".carousel-dot").forEach((d,i)=>d.classList.toggle("active",i===idx));
}
function carouselMove(dir){
  if(carouselSlides.length<2)return;
  carouselIndex=(carouselIndex+dir+carouselSlides.length)%carouselSlides.length;
  carouselSetPos(carouselIndex,true);
}
function carouselGo(idx){carouselIndex=idx;carouselSetPos(idx,true);}
let touchStartX=null;
document.getElementById("pm-carousel").addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.getElementById("pm-carousel").addEventListener("touchend",e=>{
  if(touchStartX===null)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>40)carouselMove(dx<0?1:-1);
  touchStartX=null;
},{passive:true});
document.getElementById("pm-carousel").addEventListener("click",()=>{
  if(carouselSlides.length>0)lbOpen(carouselSlides,carouselIndex);
});

/* ════ PRODUCT MODAL ════ */
let curP=null,curSize=null,curQty=1;
function openProduct(id){
  const p=products.find(x=>x.id===id);
  if(!isAvail(p))return;
  curP=p;curQty=1;
  const szArr=p.sizes.split(",").map(s=>s.trim()).filter(Boolean);
  const isPre=isPreorder(p);
  // Для преордера без размеров — сразу ставим заглушку
  const noSizes=szArr.length===0;
  curSize=szArr.length===1?szArr[0]:(isPre&&noSizes?"Уточнить размер":null);
  buildCarousel(p.photos,p.emoji);
  document.getElementById("pm-team").textContent=p.team;
  document.getElementById("pm-name").textContent=p.name;
  document.getElementById("pm-price").textContent=fmt(priceOf(p));
  document.getElementById("pm-qty").textContent="1";
  // Описание
  const descEl=document.getElementById("pm-desc");
  if(p.description){descEl.textContent=p.description;descEl.style.display="block";}
  else{descEl.style.display="none";}
  const attrs=[
    p.year?`<span class="pm-attr"><b>${S.label_year}:</b> ${p.year}</span>`:"",
    p.color?`<span class="pm-attr"><b>${S.label_color}:</b> ${p.color}</span>`:"",
    p.number?`<span class="pm-attr"><b>${S.label_number}:</b> #${p.number}</span>`:"",
  ].join("");
  document.getElementById("pm-attrs").innerHTML=attrs;

  const hasSizeStock=Object.keys(p.sizeStock).length>0;

  if(noSizes&&isPre){
    // Нет ни одного размера — преордер, показываем информационную плашку
    document.getElementById("pm-sizes").innerHTML=
      `<div style="font-size:12px;color:var(--muted);background:var(--surface3);padding:8px 12px;border-radius:var(--rsm);width:100%">Размер будет уточнён менеджером при подтверждении заказа</div>`;
  }else{
    document.getElementById("pm-sizes").innerHTML=szArr.map(s=>{
      const stockVal=p.sizeStock[s];
      // Размер заблокирован только если точно 0 и это НЕ преордер
      const isOut=!isPre&&hasSizeStock&&stockVal!==undefined&&stockVal<=0;
      return`<button class="size-btn${curSize===s?" sel":""}${isOut?" ":""}"
        ${isOut?"disabled":""}
        onclick="selSz('${s}')">${s}</button>`;
    }).join("");
  }

  updAddBtn();
  document.getElementById("pm-ov").classList.add("open");
}
function selSz(s){
  curSize=s;
  document.querySelectorAll(".size-btn").forEach(b=>b.classList.toggle("sel",b.textContent.trim()===s));
  updAddBtn();
}
function chQty(d){curQty=Math.max(1,Math.min(99,curQty+d));document.getElementById("pm-qty").textContent=curQty;}
function updAddBtn(){
  const btn=document.getElementById("pm-add");
  // Если товар на заказ и размер = "Уточнить размер" (заглушка) — кнопка активна
  const ready=!!curSize;
  btn.disabled=!ready;
  btn.textContent=ready?S.btn_add:(S.btn_add_size||"Выберите размер");
}

/* ════ CART ════ */
function addToCart(){
  if(!curSize||!curP)return;
  const sizeNote=curSize==="Уточнить размер"; // флаг для пометки в заказе
  const key=curP.id+"|"+curSize;
  const ex=cart.find(x=>x.key===key);
  if(ex){ex.qty+=curQty;}
  else{cart.push({
    key,id:curP.id,name:curP.name,team:curP.team,emoji:curP.emoji,photo:curP.photo,
    size:curSize,qty:curQty,sizeNote,
    price_primary:curP.price_primary,price_secondary:curP.price_secondary,
    year:curP.year,color:curP.color,number:curP.number,
    avail:curP.avail,preorder:isPreorder(curP),cat:curP.cat,
  });}
  updCount();closeId("pm-ov");showToast(S.msg_added);
}
function updCount(){document.getElementById("cart-count").textContent=cart.reduce((s,x)=>s+x.qty,0);}
function openCart(){renderCart();document.getElementById("cart-ov").classList.add("open");}

function renderCart(){
  const body=document.getElementById("cart-body");
  if(!cart.length){
    body.innerHTML=`<div class="cart-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      ${S.msg_empty_cart}
    </div>`;
    return;
  }
  const itemPrice=it=>currency==="primary"?it.price_primary:it.price_secondary;
  const total=cart.reduce((s,x)=>s+itemPrice(x)*x.qty,0);

  const items=cart.map((it,i)=>{
    const thumb=it.photo
      ?`<img class="ci-img" src="${driveThumb(it.photo,80)}" alt="" onerror="this.style.display='none'">`
      :`<div class="ci-emoji">${it.emoji}</div>`;
    const sub=[
      it.sizeNote?`⚠️ Размер: уточнить у менеджера`:`${S.label_size}: ${it.size}`,
      it.color?`${S.label_color}: ${it.color}`:"",
      it.number?`#${it.number}`:"",
    ].filter(Boolean).join(" · ");
    const preorderBadge=it.preorder?`<span class="ci-preorder">${it.avail}</span>`:"";
    return`
    <div class="ci">
      ${thumb}
      <div class="ci-info">
        <div class="ci-name">${it.name}${preorderBadge}</div>
        <div class="ci-sub">${sub}</div>
        <div class="ci-qrow">
          <button class="ci-qbtn" onclick="ciQ(${i},-1)">−</button>
          <span class="ci-qval">${it.qty}</span>
          <button class="ci-qbtn" onclick="ciQ(${i},1)">+</button>
        </div>
      </div>
      <div class="ci-right">
        <button class="ci-del" onclick="ciDel(${i})">✕</button>
        <div class="ci-price">${fmt(itemPrice(it)*it.qty)}</div>
      </div>
    </div>`;
  }).join("");

  const filled = deliveryData;
  const deliveryBlock = `
  <div class="delivery-section">
    <div class="delivery-section-title">📦 Доставка</div>
    ${filled ? `<div class="delivery-filled-badge">Данные доставки заполнены (${filled.type==='qazpost'?'QazPost':'CDEK'})</div>` : ''}
    <div class="delivery-tabs">
      <button class="dtab${activeDelivery==='qazpost'?' active':''}" onclick="switchDelivery('qazpost')">📮 QazPost</button>
      <button class="dtab${activeDelivery==='cdek'?' active':''}" onclick="switchDelivery('cdek')">📦 CDEK</button>
    </div>

    <div class="dtab-pane${activeDelivery==='qazpost'?' active':''}" id="pane-qazpost">
      <div class="d-field">
        <label class="d-label">ФИО получателя *</label>
        <input class="d-input" id="qp-name" type="text" placeholder="Иванов Иван Иванович" value="${filled&&filled.type==='qazpost'?filled.name:''}">
      </div>
      <div class="d-field">
        <label class="d-label">Номер телефона *</label>
        <input class="d-input" id="qp-phone" type="tel" placeholder="+7 (___) ___-__-__" value="${filled&&filled.type==='qazpost'?filled.phone:''}">
      </div>
      <div class="d-row2">
        <div class="d-field">
          <label class="d-label">Почтовый индекс</label>
          <input class="d-input" id="qp-index" type="text" placeholder="050000" maxlength="6" value="${filled&&filled.type==='qazpost'?filled.index:''}">
        </div>
        <div class="d-field">
          <label class="d-label">Город</label>
          <input class="d-input" id="qp-city" type="text" placeholder="Алматы" value="${filled&&filled.type==='qazpost'?filled.city:''}">
        </div>
      </div>
      <div class="d-field">
        <label class="d-label">Область</label>
        <input class="d-input" id="qp-region" type="text" placeholder="Алматинская" value="${filled&&filled.type==='qazpost'?filled.region:''}">
      </div>
      <div class="d-field">
        <label class="d-label">Адрес отделения QazPost *</label>
        <input class="d-input" id="qp-address" type="text" placeholder="ул. Абая 1, отделение №5" value="${filled&&filled.type==='qazpost'?filled.address:''}">
      </div>
      <p class="pvz-hint">Найти отделения: <a href="https://qazpost.kz/ru/otdeleniya" target="_blank">qazpost.kz/ru/otdeleniya</a></p>
      <button class="d-submit" id="submit-qazpost" style="width:100%;margin-top:12px;padding:11px;background:var(--red);color:#fff;border:none;border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;opacity:${filled&&filled.type==='qazpost'?'.4':'1'};cursor:${filled&&filled.type==='qazpost'?'default':'pointer'}" onclick="saveDelivery('qazpost')">Подтвердить адрес QazPost</button>
    </div>

    <div class="dtab-pane${activeDelivery==='cdek'?' active':''}" id="pane-cdek">
      <div class="d-field">
        <label class="d-label">ФИО получателя *</label>
        <input class="d-input" id="cdek-name" type="text" placeholder="Иванов Иван Иванович" value="${filled&&filled.type==='cdek'?filled.name:''}">
      </div>
      <div class="d-field">
        <label class="d-label">Номер телефона *</label>
        <input class="d-input" id="cdek-phone" type="tel" placeholder="+7 (___) ___-__-__" value="${filled&&filled.type==='cdek'?filled.phone:''}">
      </div>
      <div class="d-field">
        <label class="d-label">Адрес ПВЗ CDEK *</label>
        <input class="d-input" id="cdek-address" type="text" placeholder="г. Алматы, ул. Достык 5, ПВЗ CDEK" value="${filled&&filled.type==='cdek'?filled.address:''}">
      </div>
      <p class="pvz-hint">Найти ПВЗ: <a href="https://www.cdek.kz/ru/offices" target="_blank">cdek.kz/ru/offices</a></p>
      <button class="d-submit" id="submit-cdek" style="width:100%;margin-top:12px;padding:11px;background:var(--red);color:#fff;border:none;border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;opacity:${filled&&filled.type==='cdek'?'.4':'1'};cursor:${filled&&filled.type==='cdek'?'default':'pointer'}" onclick="saveDelivery('cdek')">Подтвердить адрес CDEK</button>
    </div>
  </div>`;

  const canOrder = !!filled;
  const disabledAttr = canOrder ? "" : "disabled";
  const hintText = canOrder ? "" : `<div class="delivery-required-hint">Сначала заполните адрес доставки</div>`;

  body.innerHTML = items +
    `<div class="cart-total"><span>${S.label_total}</span><span>${fmt(total)}</span></div>` +
    deliveryBlock +
    `<div class="cart-actions">
      ${hintText}
      <button class="oa oa-place" ${disabledAttr} onclick="placeOrder()">
        Оформить заказ
      </button>
      <button class="oa oa-clear" onclick="clearCart()">${S.btn_clear}</button>
    </div>`;
  requestAnimationFrame(()=>attachDeliveryWatchers());
}

function attachDeliveryWatchers(){
  const inputs = document.querySelectorAll('.d-input');
  inputs.forEach(inp => {
    inp.addEventListener('input', ()=>{
      const type = activeDelivery;
      const btn = document.getElementById('submit-'+type);
      if(btn){btn.style.opacity='1';btn.style.cursor='pointer';}
    }, {once:false});
  });
}
  
function ciQ(i,d){cart[i].qty=Math.max(1,cart[i].qty+d);updCount();renderCart();}
function ciDel(i){cart.splice(i,1);updCount();renderCart();}
function clearCart(){cart=[];deliveryData=null;updCount();renderCart();}

/* ════ DELIVERY ════ */
function switchDelivery(type){
  activeDelivery=type;
  renderCart(); // перерисуем корзину чтобы подсветить нужный таб
}

function saveDelivery(type){
  let data={type};
  if(type==='qazpost'){
    const name=(document.getElementById('qp-name')||{}).value?.trim()||"";
    const phone=(document.getElementById('qp-phone')||{}).value?.trim()||"";
    const address=(document.getElementById('qp-address')||{}).value?.trim()||"";
    if(!name||!phone||!address){showToast("Заполните обязательные поля (*)");return;}
    data={type,name,phone,
      index:(document.getElementById('qp-index')||{}).value?.trim()||"",
      city:(document.getElementById('qp-city')||{}).value?.trim()||"",
      region:(document.getElementById('qp-region')||{}).value?.trim()||"",
      address,
      pvzLink:""};
  }else{
    const name=(document.getElementById('cdek-name')||{}).value?.trim()||"";
    const phone=(document.getElementById('cdek-phone')||{}).value?.trim()||"";
    const address=(document.getElementById('cdek-address')||{}).value?.trim()||"";
    if(!name||!phone||!address){showToast("Заполните обязательные поля (*)");return;}
    data={type,name,phone,address,pvzLink:""};
  }
  deliveryData=data;
  showToast("Адрес доставки сохранён ✓");
  renderCart();
}

function deliveryText(){
  if(!deliveryData)return"";
  const d=deliveryData;
  if(d.type==='qazpost'){
    return`📮 Доставка: QazPost\nПолучатель: ${d.name}\nТелефон: ${d.phone}${d.index?"\nИндекс: "+d.index:""}${d.city?"\nГород: "+d.city:""}${d.region?"\nОбласть: "+d.region:""}\nОтделение: ${d.address}`;
  }
  return`📦 Доставка: CDEK\nПолучатель: ${d.name}\nТелефон: ${d.phone}\nПВЗ: ${d.address}`;
}

/* ════ ORDER NUMBER ════ */
function genOrderNum(){
  const now=new Date();
  const dd=String(now.getDate()).padStart(2,'0');
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const yy=String(now.getFullYear()).slice(-2);
  const seq=Number(localStorage.getItem('f1_order_seq')||0)+1;
  localStorage.setItem('f1_order_seq',seq);
  return`${dd}${mm}${yy}-${seq}`;
}

/* ════ PLACE ORDER ════ */
let lastOrderNum="";
async function placeOrder(){
  if(!deliveryData){showToast("Заполните адрес доставки");return;}
  const placeBtn=document.querySelector('.oa-place');
  if(placeBtn){placeBtn.disabled=true;placeBtn.textContent='Оформление…';}
  try{
    const orderNum=genOrderNum();
    lastOrderNum=orderNum;
    const itemPrice=it=>currency==="primary"?it.price_primary:it.price_secondary;
    const total=cart.reduce((s,x)=>s+itemPrice(x)*x.qty,0);

    if(CSV.orders_webhook){
      const payload={
        order_num:orderNum,
        date:new Date().toLocaleString("ru-RU"),
        delivery_type:deliveryData.type,
        recipient:deliveryData.name,
        phone:deliveryData.phone,
        address:deliveryData.address,
        city:deliveryData.city||"",
        region:deliveryData.region||"",
        index:deliveryData.index||"",
        items:cart.map(it=>{
          const price=itemPrice(it);
          const size=it.sizeNote?"⚠️":it.size;
          return `${it.name} (${size}) ${it.qty} шт. |${price}`;
        }).join("\n"),
        total:total,
        currency:curCode(),
        status:"В обработке",
      };
      try{
        console.log("📤 Отправляем заказ:", CSV.orders_webhook);
        await fetch(CSV.orders_webhook,{method:"POST",mode:"no-cors",body:JSON.stringify(payload)});
        console.log("✅ Webhook вызван");
      }catch(e){console.warn("❌ Webhook error",e);}
    }

    const waMsg=`${S.wa_msg_header||"Привет!"}\n\n#${orderNum}`;
    const waUrl=`https://wa.me/${S.whatsapp}?text=${encodeURIComponent(waMsg)}`;
    document.getElementById("confirm-order-num").textContent="#"+orderNum;
    document.getElementById("confirm-wa-btn").onclick=()=>{window.open(waUrl,'_blank');};
    closeId("cart-ov");
    document.getElementById("confirm-ov").classList.add("open");
    cart=[];deliveryData=null;updCount();

  }finally{
    const b=document.querySelector('.oa-place');
    if(b){b.disabled=false;b.textContent='Оформить заказ';}
  }
}

/* ════ OVERLAYS ════ */function closeOv(e,id){if(e.target.id===id)document.getElementById(id).classList.remove("open");}
function closeId(id){document.getElementById(id).classList.remove("open");}
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

/* ════ LIGHTBOX ════ */
let lbPhotos=[],lbIdx=0;
function lbOpen(photos,startIdx){lbPhotos=photos;lbIdx=startIdx||0;lbRender();document.getElementById("lb").classList.add("open");document.body.style.overflow="hidden";}
function lbClose(){document.getElementById("lb").classList.remove("open");document.getElementById("lb-wrap").classList.remove("zoomed");document.body.style.overflow="";}
function lbRender(){
  const wrap=document.getElementById("lb-wrap");
  wrap.classList.remove("zoomed");
  document.getElementById("lb-img").src=driveThumb(lbPhotos[lbIdx],1200);
  const multi=lbPhotos.length>1;
  document.getElementById("lb-counter").textContent=multi?`${lbIdx+1} / ${lbPhotos.length}`:"";
  document.getElementById("lb-prev").style.display=multi?"flex":"none";
  document.getElementById("lb-next").style.display=multi?"flex":"none";
}
function lbMove(dir){lbIdx=(lbIdx+dir+lbPhotos.length)%lbPhotos.length;lbRender();}
function lbToggleZoom(){document.getElementById("lb-wrap").classList.toggle("zoomed");}
function lbBgClick(e){if(e.target===document.getElementById("lb"))lbClose();}
document.addEventListener("keydown",e=>{
  if(!document.getElementById("lb").classList.contains("open"))return;
  if(e.key==="Escape")lbClose();
  if(e.key==="ArrowRight")lbMove(1);
  if(e.key==="ArrowLeft")lbMove(-1);
});
let lbTouchX=null;
document.getElementById("lb").addEventListener("touchstart",e=>{lbTouchX=e.touches[0].clientX;},{passive:true});
document.getElementById("lb").addEventListener("touchend",e=>{
  if(lbTouchX===null)return;
  const dx=e.changedTouches[0].clientX-lbTouchX;
  if(Math.abs(dx)>50)lbMove(dx<0?1:-1);
  lbTouchX=null;
},{passive:true});

/* ════ BOOT ════ */
async function init(){
  await Promise.all([loadSettings(),loadCatalog()]);
  applySettings();
  activeCat=S.filter_all||"Все";
  renderFilters();
  renderGrid();
}
init();
</script>
